name: build-runtime

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux-x64
          - runner: macos-14
            label: darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - name: Build native runtime
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x install.sh scripts/*.sh scripts/*.py
          run_install() {
            ./install.sh --adapter none --install-root "$RUNNER_TEMP/agent-headless-browser" --bin-dir "$RUNNER_TEMP/bin" "$@"
          }
          # GitHub-hosted Linux runners are ephemeral and have no credentials.
          # This explicit CI-only fallback avoids a host sandbox limitation.
          if [[ "$RUNNER_OS" == Linux ]]; then
            if output=$(run_install --allow-no-sandbox 2>&1); then code=0; else code=$?; fi
          else
            if output=$(run_install 2>&1); then code=0; else code=$?; fi
          fi
          if [[ "$code" -ne 0 ]]; then
            output=${output//$'\n'/ -- }
            echo "::error title=Native runtime build failed::${output:0:1500}"
            exit "$code"
          fi
          echo "$output"
      - name: Validate navigation
        run: |
          set -euxo pipefail
          "$RUNNER_TEMP/bin/agent-headless-browser" start
          "$RUNNER_TEMP/bin/agent-headless-browser" goto https://example.com
          "$RUNNER_TEMP/bin/agent-headless-browser" status
      - name: Validate accessibility snapshot
        run: |
          set -euxo pipefail
          "$RUNNER_TEMP/bin/agent-headless-browser" snapshot -i
      - name: Validate screenshot
        shell: bash
        run: |
          set -euo pipefail
          screenshot_path=/tmp/agent-headless-browser-smoke.png
          output=$("$RUNNER_TEMP/bin/agent-headless-browser" screenshot "$screenshot_path" 2>&1) || {
            code=$?
            output=${output//$'\n'/ -- }
            echo "::error title=Screenshot validation failed::${output:0:1500}"
            exit "$code"
          }
          echo "$output"
          test -s "$screenshot_path"
          rm -f "$screenshot_path"
      - name: Validate runtime checksum and stop
        if: always()
        run: |
          set -euxo pipefail
          "$RUNNER_TEMP/bin/agent-headless-browser" stop || true
          if [[ -f "$RUNNER_TEMP/agent-headless-browser/SHA256SUMS" ]]; then
            (cd "$RUNNER_TEMP/agent-headless-browser" && (sha256sum -c SHA256SUMS || shasum -a 256 -c SHA256SUMS))
          fi
      - name: Bundle runtime with notices
        if: success()
        run: |
          mkdir release
          cp LICENSE THIRD_PARTY_NOTICES.md release/
          tar -C "$RUNNER_TEMP" -czf "release/agent-headless-browser-${{ matrix.label }}.tar.gz" agent-headless-browser
          shasum -a 256 release/*.tar.gz > release/SHA256SUMS
      - uses: actions/upload-artifact@v5
        if: success()
        with:
          name: agent-headless-browser-${{ matrix.label }}
          path: release/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: dist
      - name: Create source package
        run: |
          mkdir -p dist/source
          git archive --format=zip --prefix="agent-headless-browser-${GITHUB_REF_NAME#v}/" HEAD > "dist/source/agent-headless-browser-${GITHUB_REF_NAME#v}-source.zip"
          shasum -a 256 dist/source/*.zip > dist/source/SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          find dist -type f -exec gh release upload "$GITHUB_REF_NAME" {} --clobber \;
